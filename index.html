<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Институт цветных металлов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* === ФОНОВОЕ ИЗОБРАЖЕНИЕ === */
            /* 
               background: 
               1. url('bg.jpg') - путь к фоновому изображению
               2. center - центрирование изображения
               3. cover - заполняет весь экран (обрезая края при необходимости)
               4. no-repeat - не повторять изображение
               
               Для мобильных устройств добавлены дополнительные правила ниже
            */
            background: url('bg.jpg') center/cover no-repeat;
            background-size: cover; /* Гарантирует заполнение экрана */
            background-position: center; /* Центрирование */
            background-attachment: fixed; /* Фиксация фона */
            color: white; overflow-x: hidden;
        }

        /* === АДАПТИВНЫЙ ФОН ДЛЯ МОБИЛЬНЫХ === */
        @media (max-width: 768px) {
            body {
                /* На мобильных устройствах */
                background-size: cover;
                background-position: center top; /* Смещение к верхней части */
            }
        }
        
        @media (max-width: 480px) {
            body {
                /* На очень маленьких экранах */
                background-size: cover;
                background-position: 50% 30%; /* Корректировка позиции */
            }
        }

        #menuScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; z-index: 100;
            /* Затемнение фона */
            background: rgba(0,0,0,0.6);
        }
        .logo {
            font-size: 2rem; font-weight: bold; margin-bottom: 10px; text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .subtitle {
            font-size: 1.1rem; opacity: 0.9; margin-bottom: 40px; text-align: center;
        }
        
        /* === СТИЛИ КНОПОК === */
        .btn {
            width: 100%; max-width: 400px; padding: 18px 24px; margin: 12px 0;
            
            /* === ЦВЕТ КНОПКИ === */
            /* 
               background: rgba(255,255,255,0.15)
               - первые три числа (255,255,255) = цвет (белый)
               - последнее число (0.15) = прозрачность (0.0 до 1.0)
               
               Чтобы изменить цвет кнопки, используйте:
               - rgba(КРАСНЫЙ, ЗЕЛЕНЫЙ, СИНИЙ, ПРОЗРАЧНОСТЬ)
               
               Примеры цветов:
               🔴 Красный: rgba(233, 69, 96, 0.8)
               🔵 Синий: rgba(15, 52, 96, 0.8)
               🟢 Зеленый: rgba(39, 174, 96, 0.8)
               🟡 Желтый: rgba(241, 196, 15, 0.8)
               🟣 Фиолетовый: rgba(142, 68, 173, 0.8)
               ⚫ Черный: rgba(0, 0, 0, 0.8)
               
               border: 2px solid rgba(255,255,255,0.3) - цвет рамки (белая полупрозрачная)
            */
            
            background: rgba(255,255,255,0.15); /* Текущий цвет: полупрозрачный белый */
            border: 2px solid rgba(255,255,255,0.3); /* Рамка: белая */
            border-radius: 16px; /* Скругление углов */
            color: white; /* Цвет текста */
            font-size: 1.1rem; font-weight: 500;
            cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(10px);
        }
        
        /* === ЭФФЕКТ ПРИ НАВЕДЕНИИ === */
        .btn:hover {
            background: rgba(255,255,255,0.3); /* Более светлый при наведении */
            transform: translateY(-3px); /* Приподнимание кнопки */
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); /* Тень */
        }
        .btn:active { transform: translateY(-1px); }

        #videoScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: none; flex-direction: column; z-index: 200;
        }
        .video-header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
        }
        .video-title { font-size: 1.2rem; font-weight: 600; }
        
        /* === КНОПКА "НАЗАД" === */
        .back-btn {
            padding: 10px 20px; background: #e94560; /* Цвет кнопки: красно-розовый */
            border: none; border-radius: 10px;
            color: white; font-weight: 600; cursor: pointer; transition: background 0.3s;
        }
        .back-btn:hover { background: #ff6b6b; /* Светлее при наведении */ }
        
        .video-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 10px;
        }
        video {
            width: 100%; max-width: 1200px; max-height: 85vh;
            border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            object-fit: contain; background: black;
        }

        /* === АДАПТИВ ДЛЯ МОБИЛЬНЫХ === */
        @media (max-width: 768px) {
            .logo { font-size: 1.8rem; }
            .subtitle { font-size: 1rem; }
            .btn { 
                padding: 16px 20px; 
                font-size: 1rem;
                max-width: 350px;
            }
            .video-title { font-size: 1rem; }
            .back-btn { padding: 8px 16px; font-size: 0.9rem; }
        }
        
        @media (max-width: 480px) {
            .logo { font-size: 1.5rem; }
            .subtitle { font-size: 0.9rem; margin-bottom: 30px; }
            .btn { 
                padding: 14px 18px; 
                font-size: 0.95rem;
                max-width: 300px;
            }
            .video-title { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div id="menuScreen">
        <div class="logo">⛏️ Институт цветных металлов</div>
        <div class="subtitle">Выберите раздел</div>
        
        <!-- ОСТАВЛЕНЫ ТОЛЬКО ДВЕ КНОПКИ -->
        <button class="btn" onclick="playVideo('greeting')">👋 Приветствие</button>
        <button class="btn" onclick="playVideo('event')">📅 Актуальное событие</button>
    </div>

    <div id="videoScreen">
        <div class="video-header">
            <div class="video-title" id="videoTitle">Название видео</div>
            <button class="back-btn" onclick="closeVideo()">← Назад</button>
        </div>
        <div class="video-container">
            <video id="mainVideo" controls playsinline preload="metadata">
                <source src="" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
        </div>
    </div>

    <script>
        // === НАСТРОЙКИ ВИДЕО ===
        // Указываем пути только к двум видеофайлам
        const videos = {
            greeting: { 
                src: 'videos/gosha.mp4',      // Видео приветствия
                title: '👋 Приветствие' 
            },
            event: { 
                src: 'videos/event.mp4',      // Видео актуального события
                title: '📅 Актуальное событие' 
            }
        };

        const menuScreen = document.getElementById('menuScreen');
        const videoScreen = document.getElementById('videoScreen');
        const mainVideo = document.getElementById('mainVideo');
        const videoTitle = document.getElementById('videoTitle');
        const videoSource = document.querySelector('#mainVideo source');

        function playVideo(key) {
            const video = videos[key];
            if (!video) {
                console.log('Видео не найдено:', key);
                return;
            }

            console.log('Загружаем:', video.src);

            // Очищаем текущее видео
            mainVideo.pause();
            mainVideo.removeAttribute('src');
            mainVideo.load();

            // Устанавливаем новый источник
            videoSource.src = video.src;
            mainVideo.load();

            // Показываем экран видео
            menuScreen.style.display = 'none';
            videoScreen.style.display = 'flex';
            videoTitle.textContent = video.title;

            // Запускаем воспроизведение
            setTimeout(() => {
                mainVideo.play().catch(e => {
                    console.log('Ошибка воспроизведения:', e);
                    alert('Видео не загрузилось: ' + video.src);
                });
            }, 100);
        }

        function closeVideo() {
            mainVideo.pause();
            mainVideo.removeAttribute('src');
            mainVideo.load();
            
            videoScreen.style.display = 'none';
            menuScreen.style.display = 'flex';
            
            console.log('Видео закрыто, меню активно');
        }

        // Закрытие по клавише Esc
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && videoScreen.style.display === 'flex') {
                closeVideo();
            }
        });
    </script>
</body>
</html>
